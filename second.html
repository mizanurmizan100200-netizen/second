<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS-Cascading Style Sheet </title>
    <style>
        h1{
            color:rgb(208, 153, 153);
        }
        .special-effect:hover{
            color:red;
            font-size: 30px;
            background-color: blue;

        }
        p{
            color:blue;
        }
        h2{
            color:green;
        }
        input:focus{
            font-weight: 800px;
            font-size: 40px;
            color: goldenrod;
        }
        li:nth-child(2n+1){
            background-color: aqua;
            color:blue;
        }
        a:visited{
            color:blue;
            
        }
    </style>
</head>
